<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a6b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="자체점검 시스템">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.svg">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>행정업무 자체점검 | 유한대학교 감사실</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a3a6b;--blue:#2557a7;--blue2:#3b72c4;
  --ok:#1a7f4b;--ok-bg:#e6f7ef;--ok-b:#7ecfa4;
  --bg:#eef2f8;--surf:#fff;
  --txt:#1c2b3a;--txt2:#5a6878;--txt3:#96a4b0;
  --sh:0 4px 24px rgba(26,58,107,.13);
}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt)}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%,rgba(37,87,167,.10) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%,rgba(26,58,107,.08) 0%,transparent 60%);
  pointer-events:none;
}
.wrap{
  position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 16px;
}
.header{text-align:center;margin-bottom:40px}
.logo-icon{
  width:80px;height:80px;border-radius:20px;margin:0 auto 16px;
  background:linear-gradient(135deg,#1a3a6b,#2557a7);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(26,58,107,.25);
}
.school{font-size:12px;font-weight:600;color:var(--txt3);letter-spacing:1.5px;margin-bottom:6px}
.title{font-size:26px;font-weight:900;color:var(--navy);letter-spacing:-.5px;line-height:1.25}
.title span{color:var(--blue2)}
.subtitle{font-size:13px;color:var(--txt2);margin-top:8px}
.year-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(26,58,107,.07);border-radius:20px;
  padding:5px 16px;font-size:12px;font-weight:600;color:var(--navy);
  margin-bottom:16px;
}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:580px}
.card{
  background:var(--surf);border-radius:18px;padding:32px 20px;text-align:center;
  box-shadow:var(--sh);text-decoration:none;color:inherit;
  border:2px solid transparent;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.card:hover{transform:translateY(-4px) scale(1.02);border-color:var(--blue2);box-shadow:0 12px 40px rgba(26,58,107,.18)}
.card:active{transform:scale(.97)}
.card-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px}
.card.dept .card-icon{background:#dce9f8}
.card.admin .card-icon{background:rgba(26,58,107,.08)}
.card-title{font-size:16px;font-weight:800;color:var(--navy);line-height:1.3}
.card-desc{font-size:11.5px;color:var(--txt2);line-height:1.7}
.card-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;margin-top:4px;
}
.card.dept .card-badge{background:var(--ok-bg);color:var(--ok);border:1.5px solid var(--ok-b)}
.card.admin .card-badge{background:rgba(88,166,255,.12);color:#2557a7;border:1.5px solid rgba(88,166,255,.35)}
.footer{margin-top:36px;text-align:center;font-size:11px;color:var(--txt3);line-height:1.9}
@media(max-width:480px){
  .cards{grid-template-columns:1fr}
  .title{font-size:22px}
  .card{padding:24px 16px}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo-icon">
      <svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg" width="46" height="46">
        <rect x="8" y="12" width="30" height="28" rx="4" stroke="white" stroke-width="2.8"/>
        <rect x="15" y="8" width="16" height="8" rx="4" fill="#1a3a6b" stroke="white" stroke-width="2.5"/>
        <line x1="14" y1="23" x2="32" y2="23" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
        <line x1="14" y1="29" x2="32" y2="29" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
        <line x1="14" y1="35" x2="24" y2="35" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="32" cy="35" r="6" fill="#3fb950"/>
        <polyline points="28.5,35 31,37.5 35.5,32.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="school">유한대학교 감사실</div>
    <div class="title">행정업무 종합<br><span>자체점검 시스템</span></div>
    <div class="subtitle">Yuhan University Internal Audit System</div>
  </div>

  <div class="year-badge">📅 <span id="yearLabel">2025학년도</span></div>

  <div class="cards">
    <a class="card dept" href="dept.html">
      <div class="card-icon">📋</div>
      <div>
        <div class="card-title">부서 자체점검<br>입력</div>
        <div class="card-desc">담당 부서의 점검 항목을<br>입력하고 제출합니다</div>
      </div>
      <div class="card-badge">✅ 부서 담당자</div>
    </a>

    <a class="card admin" href="admin.html">
      <div class="card-icon">🔍</div>
      <div>
        <div class="card-title">관리자<br>현황판</div>
        <div class="card-desc">전체 부서 제출 현황을<br>확인하고 관리합니다</div>
      </div>
      <div class="card-badge">🔒 감사실 전용</div>
    </a>
  </div>

  <div class="footer">
    유한대학교 입학·학생처 학생복지팀<br>
    문의: 감사실 담당자
  </div>
</div>

<script>
(function(){
  const yr = localStorage.getItem('yuhan_current_year') || '2025';
  document.getElementById('yearLabel').textContent = yr + '학년도';
})();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
