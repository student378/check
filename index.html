<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=dept.html">
<title>유한대학교 자체점검 시스템</title>
<style>
  body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:#1a3a6b;display:flex;align-items:center;justify-content:center;
    min-height:100vh;margin:0;padding:20px;box-sizing:border-box}
  .wrap{text-align:center;color:#fff}
  .logo{font-size:48px;margin-bottom:16px}
  h1{font-size:20px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
  p{font-size:13px;opacity:.6;margin-bottom:32px}
  .btns{display:flex;flex-direction:column;gap:12px;max-width:300px;margin:0 auto}
  a.btn{display:block;padding:16px 24px;border-radius:10px;font-size:15px;
    font-weight:700;text-decoration:none;transition:all .2s}
  .btn-dept{background:#fff;color:#1a3a6b}
  .btn-dept:hover{background:#dce9f8}
  .btn-admin{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3)}
  .btn-admin:hover{background:rgba(255,255,255,.25)}
  .sub{font-size:11px;opacity:.45;margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">📋</div>
  <h1>유한대학교 행정업무 자체점검</h1>
  <p>감사실 자체점검 통합 시스템</p>
  <div class="btns">
    <a class="btn btn-dept" href="dept.html">✏️ 부서 담당자 입력</a>
    <a class="btn btn-admin" href="admin.html">🔒 감사실 관리자</a>
  </div>
  <div class="sub">유한대학교 감사실 · 학생복지팀</div>
</div>
</body>
</html>
