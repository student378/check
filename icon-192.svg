<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b"/>
      <stop offset="100%" style="stop-color:#2557a7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- 배경 -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <rect width="192" height="192" rx="38" fill="url(#shine)"/>
  <!-- 클립보드 몸체 -->
  <rect x="48" y="52" width="96" height="112" rx="8" fill="none" stroke="#ffffff" stroke-width="4.5"/>
  <!-- 클립보드 상단 클립 -->
  <rect x="74" y="44" width="44" height="18" rx="9" fill="#1a3a6b" stroke="#ffffff" stroke-width="4"/>
  <!-- 체크라인 1 -->
  <line x1="64" y1="86" x2="128" y2="86" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <!-- 체크라인 2 -->
  <line x1="64" y1="106" x2="128" y2="106" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <!-- 체크라인 3 -->
  <line x1="64" y1="126" x2="104" y2="126" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <!-- 체크마크 (우측 하단) -->
  <circle cx="124" cy="134" r="20" fill="#3fb950"/>
  <polyline points="114,134 121,141 135,127" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
